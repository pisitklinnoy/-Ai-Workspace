services:
  redis:
    image: redis:8.8.0-alpine
    container_name: redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    command: >
      redis-server
      --appendonly yes

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb

    ports:
      - "5432:5432"

    volumes:
      - postgresql-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: label-studio
    restart: unless-stopped

    depends_on:
      - postgres

    environment:
      DJANGO_DB: default
      POSTGRE_NAME: appdb
      POSTGRE_USER: appuser
      POSTGRE_PASSWORD: apppass
      POSTGRE_PORT: 5432
      POSTGRE_HOST: postgres

    ports:
      - "8080:8080"

volumes:
  redis-data:
  postgresql-data:
